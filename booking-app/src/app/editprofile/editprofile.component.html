<div class="profile max-w-2xl mx-auto px-4 py-8 text-gray-800 dark:text-gray-100">
  <h2 class="text-3xl font-bold mb-4">Edit Profile</h2>

  <!-- Error Message -->
  <p *ngIf="error" class="text-red-500 mb-4 font-semibold">{{ error }}</p>

  <!-- User Profile Details -->
  <div *ngIf="user" class="bg-gray-100 dark:bg-gray-800 p-6 rounded-lg shadow-md">
    <div class="mb-4">
      <p><strong>First Name:</strong> {{ user.firstName }}</p>
      <p><strong>Last Name:</strong> {{ user.lastName }}</p>
      <p><strong>Email:</strong> {{ user.email }}</p>
      <p><strong>Phone Number:</strong> {{ user.phoneNumber }}</p>
    </div>

    <!-- Delete Account Button -->
    <button
      (click)="handleDeleteProfile()"
      class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-md transition"
    >
      Delete My Account
    </button>
  </div>
</div>
