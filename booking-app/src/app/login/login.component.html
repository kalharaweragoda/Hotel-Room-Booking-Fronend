<div class="flex items-center justify-center min-h-screen bg-gray-100 dark:bg-gray-900 px-4">
  <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800 dark:text-white">Login</h2>

    <p *ngIf="error" class="text-red-600 mb-4 text-sm text-center">{{ error }}</p>

    <form (ngSubmit)="handleSubmit()" class="space-y-4">
      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="formData.email"
        name="email"
        required
        class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white"
      />
      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="formData.password"
        name="password"
        required
        class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white"
      />

      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition duration-200"
      >
        Login
      </button>
    </form>

    <p class="mt-4 text-center text-gray-600 dark:text-gray-300 text-sm">
      Don't have an account?
      <a routerLink="/register" class="text-blue-600 hover:underline dark:text-blue-400">Register</a>
    </p>
  </div>
</div>
